<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lung Cancer Detection</title>

    <!-- ✅ Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            max-width: 700px;
            margin-top: 50px;
        }
        .card {
            border-radius: 12px;
        }
        .custom-file-input {
            border: 2px dashed #ced4da;
            padding: 20px;
            text-align: center;
            background-color: white;
            border-radius: 10px;
            cursor: pointer;
        }
        .custom-file-input input {
            display: none;
        }
        .file-names {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4 text-primary">Lung Cancer Detection</h2>

        <!-- ✅ Upload Form -->
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3 custom-file-input" onclick="document.getElementById('images').click()">
                <label id="file-label" for="images">Click here to select lung scan images</label><br>
                <input type="file" name="images" id="images" multiple accept=".png, .jpg, .jpeg" onchange="showFileNames()" required>
                <div id="file-names" class="file-names"></div>
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-success mt-3">Predict</button>
            </div>
        </form>

        <!-- ✅ Display Results -->
        {% if results %}
            <hr>
            <h4 class="mt-4 text-success">Prediction Results:</h4>
            <ul class="list-group mt-3">
                {% for file, label in results %}
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <span>{{ file }}</span>
                        <span class="badge bg-info text-dark px-3 py-2">{{ label }}</span>
                    </li>
                {% endfor %}
            </ul>
        {% endif %}
    </div>
</div>

<!-- ✅ JavaScript to show file names -->
<script>
    function showFileNames() {
        const input = document.getElementById('images');
        const output = document.getElementById('file-names');
        let files = input.files;
        let names = [];

        for (let i = 0; i < files.length; i++) {
            names.push(files[i].name);
        }

        output.innerHTML = names.join('<br>');
    }
</script>

</body>
</html>
