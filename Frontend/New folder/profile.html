        <label>Full Name:</label>
        <input type="text" name="fullname" value="Rohan Sharma" required />
        <label>Email:</label>
        <input type="email" name="email" value="rohan@email.com" required />
        <label>Username:</label>
        <input type="text" name="username" value="rohan123" required disabled />
        <label>Change Password:</label>
        <input type="password" name="password" placeholder="New Password"/>
        <button type="submit" class="cta-btn">Update Profile</button>
      </form>
    </div>
