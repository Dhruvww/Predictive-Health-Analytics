<!-- templates/upload_images.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Upload Lung Scan Images</title>
</head>
<body>
    <h2>Upload Lung Scan Images</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="file" name="images" multiple accept=".png, .jpg, .jpeg" required>
        <br><br>
        <button type="submit">Predict</button>
    </form>
</body>
</html>
