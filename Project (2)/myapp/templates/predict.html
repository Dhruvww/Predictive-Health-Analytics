<!DOCTYPE html>
<html>
<head>
    <title>Heart Disease Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f6fc;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .wrapper {
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            background-color: #fff;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-radius: 12px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        form {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .form-group {
            flex: 1 1 45%;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #555;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #4285f4;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #3367d6;
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 18px;
            color: green;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Heart Disease Prediction</h1>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Age:</label>
            <input type="text" name="age">
        </div>

        <div class="form-group">
            <label>Sex:</label>
            <input type="text" name="sex">
        </div>

        <div class="form-group">
            <label>Chest Pain Type (cp):</label>
            <input type="text" name="cp">
        </div>

        <div class="form-group">
            <label>Resting BP (trestbps):</label>
            <input type="text" name="trestbps">
        </div>

        <div class="form-group">
            <label>Cholesterol:</label>
            <input type="text" name="chol">
        </div>

        <div class="form-group">
            <label>Fasting Blood Sugar (fbs):</label>
            <input type="text" name="fbs">
        </div>

        <div class="form-group">
            <label>Rest ECG (restecg):</label>
            <input type="text" name="restecg">
        </div>

        <div class="form-group">
            <label>Max Heart Rate (thalach):</label>
            <input type="text" name="thalach">
        </div>

        <div class="form-group">
            <label>Exercise Induced Angina (exang):</label>
            <input type="text" name="exang">
        </div>

        <div class="form-group">
            <label>Oldpeak:</label>
            <input type="text" name="oldpeak">
        </div>

        <div class="form-group">
            <label>Slope:</label>
            <input type="text" name="slope">
        </div>

        <div class="form-group">
            <label>Number of Major Vessels (ca):</label>
            <input type="text" name="ca">
        </div>

        <div class="form-group">
            <label>Thal:</label>
            <input type="text" name="thal">
        </div>

        <div style="flex: 1 1 100%;">
            <button type="submit">Predict</button>
        </div>
    </form>

    {% if result is not None %}
        <div class="result">Prediction Result: {{ message }}</div>
    {% endif %}
</div>

</body>
</html>
