<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | HealthAI Center</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header class="header">
    <nav class="nav-bar">
      <div class="logo">HealthAI</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html" class="active-link">Register</a></li>
      </ul>
    </nav>
  </header>

  <main class="login-container">
    <form class="auth-form" method="post" autocomplete="off">
      <h2>Create Account</h2>
      <input type="text" name="fullname" placeholder="Full Name" required />
      <input type="email" name="email" placeholder="Email" required />
      <input type="text" name="username" placeholder="Username" required />
      <input type="password" name="password" placeholder="Password" required />
      <input type="password" name="confirm_password" placeholder="Confirm Password" required />
      <button type="submit" class="cta-btn">Sign Up</button>
      <p>Already have an account? <a href="login.html">Login</a></p>
    </form>
  </main>

  <footer class="footer">
    &copy; 2025 HealthAI Center
  </footer>
</body>
</html>
